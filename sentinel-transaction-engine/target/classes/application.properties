# 1. Identity
spring.application.name=transaction-engine
server.port=8080

# 2. Database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update

# 3. Kafka Producer
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# 4. Kafka Consumer (Feedback Loop)
spring.kafka.consumer.group-id=transaction-group-v5
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.sentinel.common.dto

# 5. Feign
risk-service.url=http://localhost:8081

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.queries.hibernate.default_schema=
spring.h2.console.settings.web-allow-others=true